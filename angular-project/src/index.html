<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>النظام المحاسبي المتخصص لتجار الطاقة الكهربائية</title>
  <base href="/">
  
  <!-- Google Fonts - Arabic -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  
  <style>
    /* Loading Splash Screen */
    .app-loading {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, #1a237e, #0d47a1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      color: white;
    }
    .app-loading .logo {
      width: 100px; height: 100px;
      background: linear-gradient(135deg, #ffd600, #ff6f00);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .app-loading .logo .material-icons { font-size: 50px; color: white; }
    .app-loading h1 { font-family: 'Cairo', sans-serif; font-size: 24px; margin-bottom: 8px; }
    .app-loading p { font-family: 'Cairo', sans-serif; opacity: 0.7; }
    .app-loading .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top: 3px solid #ffd600;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-top: 24px;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <app-root>
    <!-- Loading Screen -->
    <div class="app-loading">
      <div class="logo">
        <span class="material-icons">bolt</span>
      </div>
      <h1>النظام المحاسبي المتخصص</h1>
      <p>لتجار الطاقة الكهربائية</p>
      <div class="spinner"></div>
    </div>
  </app-root>
</body>
</html>
