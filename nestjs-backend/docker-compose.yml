version: '3.8'

services:
  # ─── قاعدة البيانات ───
  db:
    image: mysql:8.0
    container_name: electricity-db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: electricity_accounting
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ../angular-project/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ───
  api:
    build: .
    container_name: electricity-api
    environment:
      PORT: 3000
      NODE_ENV: production
      DB_TYPE: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_USERNAME: app_user
      DB_PASSWORD: app_password
      DB_DATABASE: electricity_accounting
      JWT_SECRET: your-production-jwt-secret-here
      JWT_EXPIRATION: 24h
      CORS_ORIGIN: http://localhost:4200
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ─── Frontend (Angular) ───
  frontend:
    image: nginx:alpine
    container_name: electricity-frontend
    volumes:
      - ../angular-project/dist/electricity-accounting/browser:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  db_data:
